<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Architect</title>
    <style>
        /* Modern, clean layout styles */
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: #f4f7f6; 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 600px; 
        }
        h1 { 
            color: #1e293b; 
            margin-top: 0; 
            font-size: 28px;
        }
        p {
            color: #64748b;
            font-size: 15px;
            line-height: 1.5;
        }
        textarea { 
            width: 100%; 
            height: 120px; 
            padding: 12px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            resize: none; 
            font-size: 16px; 
            box-sizing: border-box; 
            margin-top: 10px;
        }
        textarea:focus {
            outline: 2px solid #2563eb;
            border-color: transparent;
        }
        button { 
            background: #2563eb; 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            font-size: 16px; 
            font-weight: 600;
            border-radius: 6px; 
            cursor: pointer; 
            margin-top: 15px; 
            width: 100%; 
            transition: background 0.2s; 
        }
        button:hover { 
            background: #1d4ed8; 
        }
        h3 {
            color: #334155;
            margin-top: 30px;
            margin-bottom: 10px;
        }
        .output-box { 
            background: #f8fafc; 
            border: 1px dashed #cbd5e1; 
            padding: 15px; 
            border-radius: 6px; 
            min-height: 100px; 
            white-space: pre-wrap; 
            font-family: monospace; 
            color: #334155;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Prompt Architect</h1>
    <p>Enter your basic, raw idea below. The AI will transform it into a highly professional, structured prompt that you can paste into ChatGPT or Claude.</p>
    
    <!-- User input field -->
    <textarea id="userInput" placeholder="e.g., Write an email asking my boss for a raise..."></textarea>
    
    <!-- Action button -->
    <button onclick="generatePrompt()">Generate Engineered Prompt</button>
    
    <h3>Your Optimized Prompt:</h3>
    <!-- Target area where the generated prompt will appear -->
    <div id="output" class="output-box">Your engineered prompt will appear here...</div>
</div>

<!-- Links this visual page to your JavaScript logic file -->
<script src="script.js"></script>
</body>
</html>
